[package]
name = "zerm"
version = "0.1.0"
description = "Developer voice-to-agent app"
edition = "2021"

[lib]
name = "zerm_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
