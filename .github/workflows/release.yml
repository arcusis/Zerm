name: Release

# Builds Zerm for macOS (arm64 + x86_64), Windows, and Linux on every tag
# push, uploads the installers as a draft GitHub Release. Edit the release
# notes and publish manually.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - label: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles app,dmg"
          - label: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--bundles msi,nsis"
          - label: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--bundles deb,appimage"

    steps:
      - uses: actions/checkout@v5

      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --system core.longpaths true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev \
            libxdo-dev \
            cmake \
            build-essential

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Touch models directory
        shell: bash
        run: |
          mkdir -p models
          touch models/.gitkeep

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force MSVC generator for whisper.cpp's CMake build on Windows.
          CMAKE_GENERATOR: ${{ runner.os == 'Windows' && 'Visual Studio 17 2022' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Zerm ${{ github.ref_name }}"
          releaseBody: |
            ## First launch
            1. Open Zerm. The dashboard appears with a "Set up Zerm" banner.
            2. Click **Download Whisper model** in the banner — Zerm streams
               the multilingual ggml-small.bin (~466 MB) into your app data
               directory and loads it automatically.
            3. Install [Ollama](https://ollama.com/download), then in a
               terminal: `ollama pull gemma3:4b`. Zerm picks it up live.
            4. macOS: grant Accessibility permission when prompted so the
               Right Option hotkey can fire and auto-paste can simulate ⌘V.

            ## Use it
            Tap **Right Option**, speak, stop talking. The cleaned text
            lands in your clipboard and pastes into whatever app is focused.

            ## Notes
            - macOS builds are unsigned for this prerelease — first launch
              requires `xattr -cr /Applications/Zerm.app` or right-click → Open.
            - Windows .msi is unsigned; SmartScreen will warn — click "More
              info" → "Run anyway".
            - Linux .AppImage is built on Ubuntu 22.04 — should run on
              22.04+.

            ## Changes
            <https://github.com/arcusis/Zerm/commits/${{ github.ref_name }}>
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: ${{ matrix.args }}
